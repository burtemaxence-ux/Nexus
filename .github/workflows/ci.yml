name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les runs précédents encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Tests · Build
    runs-on: ubuntu-latest
    # Variables publiques Supabase (Settings → Secrets and variables → Actions
    # → Variables). Inlinées au build par Next (NEXT_PUBLIC_*) ; vides tant
    # qu'elles ne sont pas configurées — le build les tolère, le smoke se saute.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Garde-fou marque (pas de "Nexus" visible côté utilisateur)
        run: |
          if grep -rn "Nexus" public/sw.js lib/email components/public 2>/dev/null; then
            echo "::error::Référence 'Nexus' visible par l'utilisateur détectée — utiliser 'Quartzbase'."
            exit 1
          fi

      - name: Build
        run: npm run build

      # Smoke HTTP (audit 2026-07-21, P1-4) : démarre l'app buildée et vérifie
      # que les pages publiques répondent et qu'une route protégée redirige
      # vers /login. Nécessite les 2 variables publiques Supabase en secrets
      # (NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY) ; l'étape
      # est sautée proprement tant qu'elles ne sont pas configurées.
      - name: Smoke test HTTP
        if: ${{ vars.NEXT_PUBLIC_SUPABASE_URL != '' }}
        run: |
          npx next start -p 3100 & echo $! > /tmp/next.pid
          for i in $(seq 1 30); do curl -sf http://localhost:3100/login -o /dev/null && break; sleep 1; done
          BASE_URL=http://localhost:3100 node scripts/smoke.mjs
          kill "$(cat /tmp/next.pid)" || true
