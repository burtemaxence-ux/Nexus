name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les runs précédents encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Garde-fou marque (pas de "Nexus" visible côté utilisateur)
        run: |
          if grep -rn "Nexus" public/sw.js lib/email components/public 2>/dev/null; then
            echo "::error::Référence 'Nexus' visible par l'utilisateur détectée — utiliser 'Quartzbase'."
            exit 1
          fi

      - name: Build
        run: npm run build
